<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050403">
<link rel="manifest" href="manifest.json">
<title>TEMPO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --mono: 'Space Mono', monospace;
  --serif: 'DM Serif Display', serif;
  --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  
  /* Luxury Material Palette */
  --bg-core: #050403;
  --ambient-glow: radial-gradient(circle at 50% 40%, rgba(34, 28, 22, 0.15) 0%, rgba(5, 4, 3, 0) 70%);
  --text-bright: #e8e5e0;
  --text-soft: #8a847c;
  --text-dark: #383430;
  --gold: #c2a67e;
  
  /* Engine Flip Tokens */
  --fw:62px;--fh:88px;--ffs:76px;
  --ftop:6px;--fbot:-38px;
  --frad:4px;--fc:#0f0e0d;--fd:#e8e5e0;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background-color:var(--bg-core);
  font-family:var(--sans);
  color:var(--text-bright);
  -webkit-tap-highlight-color:transparent;
  user-select:none;touch-action:none;
}

/* ═══════════════════════════════════════════
   THE ATMOSPHERIC CANVAS
═══════════════════════════════════════════ */
.canvas {
  position:fixed;inset:0;
  background-color:var(--bg-core);
  background-image:var(--ambient-glow);
  transition:background 1.6s cubic-bezier(0.25, 1, 0.5, 1);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:32px;
  padding-bottom:max(32px, env(safe-area-inset-bottom));
  padding-top:max(32px, env(safe-area-inset-top));
}

/* Sound State Map Glows */
.canvas[data-sound="rain"] { --ambient-glow: radial-gradient(circle at 50% 30%, rgba(24, 36, 43, 0.35) 0%, rgba(5, 6, 8, 0) 75%); }
.canvas[data-sound="storm"] { --ambient-glow: radial-gradient(circle at 50% 30%, rgba(20, 22, 33, 0.4) 0%, rgba(4, 5, 7, 0) 70%); }
.canvas[data-sound="cafe"] { --ambient-glow: radial-gradient(circle at 50% 30%, rgba(46, 34, 23, 0.35) 0%, rgba(6, 5, 4, 0) 75%); }
.canvas[data-sound="library"] { --ambient-glow: radial-gradient(circle at 50% 30%, rgba(28, 33, 26, 0.25) 0%, rgba(4, 5, 4, 0) 75%); }

/* Active Timer State Overrides */
.canvas[data-state="a_run"] { --ambient-glow: radial-gradient(circle at 50% 40%, rgba(61, 35, 18, 0.25) 0%, rgba(5, 4, 3, 0) 70%); }
.canvas[data-state="a_ov"] { --ambient-glow: radial-gradient(circle at 50% 50%, rgba(82, 16, 16, 0.35) 0%, rgba(8, 3, 3, 0) 70%); }
.canvas[data-state="b_run"] { --ambient-glow: radial-gradient(circle at 50% 60%, rgba(16, 48, 69, 0.35) 0%, rgba(3, 5, 8, 0) 70%); }

/* ═══════════════════════════════════════════
   FLIP ENGINE COMPONENTS (Sleekened/Integrated)
═══════════════════════════════════════════ */
.flip-row{display:flex;align-items:center;gap:4px}
.flip-sep{
  font-family:var(--mono);font-weight:400;
  font-size:calc(var(--ffs) * 0.9);line-height:1;
  color:var(--text-dark);transition:color .8s;
  padding-bottom:10px;
}
.fu{
  position:relative;
  width:var(--fw);height:var(--fh);
  perspective:300px;
}
.fu::after{
  content:'';position:absolute;
  top:calc(50% - .5px);left:0;right:0;
  height:1px;background:rgba(0,0,0,0.5);
  z-index:6;pointer-events:none;
}
.fh{
  position:absolute;width:100%;height:50%;
  overflow:hidden;background:var(--fc);
  box-shadow:inset 0 1px 0px rgba(255,255,255,0.02);
}
.fh.t{top:0;border-radius:var(--frad) var(--frad) 0 0;z-index:1}
.fh.b{bottom:0;border-radius:0 0 var(--frad) var(--frad);z-index:1}
.fh span{
  position:absolute;left:0;right:0;text-align:center;
  font-family:var(--mono);font-size:var(--ffs);
  font-weight:400;line-height:1;
  color:var(--fd);transition:color .8s ease;
}
.fh.t span{top:var(--ftop)}
.fh.b span{top:var(--fbot)}
.flap{
  position:absolute;width:100%;height:50%;
  overflow:hidden;background:var(--fc);
  transform-style:preserve-3d;backface-visibility:hidden;
}
.flap.ft{
  top:0;border-radius:var(--frad) var(--frad) 0 0;
  transform-origin:center bottom;z-index:2;
}
.flap.fb{
  bottom:0;border-radius:0 0 var(--frad) var(--frad);
  transform-origin:center top;z-index:2;
  transform:rotateX(90deg);
}
.flap span{
  position:absolute;left:0;right:0;text-align:center;
  font-family:var(--mono);font-size:var(--ffs);
  font-weight:400;line-height:1;
  color:var(--fd);transition:color .8s ease;
}
.flap.ft span{top:var(--ftop)}
.flap.fb span{top:var(--fbot)}
.flap.ft.go{animation:fUp 150ms ease-in forwards}
.flap.fb.go{animation:fDn 170ms ease-out forwards;animation-delay:110ms}
@keyframes fUp{from{transform:rotateX(0)}    to{transform:rotateX(-90deg)}}
@keyframes fDn{from{transform:rotateX(90deg)}to{transform:rotateX(0)}}

/* ═══════════════════════════════════════════
   THE LUXURY MONOGRAPH HOME
═══════════════════════════════════════════ */
#home {
  position:absolute;inset:32px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:opacity .6s cubic-bezier(0.25, 1, 0.5, 1), transform .6s cubic-bezier(0.25, 1, 0.5, 1);
}
#home.gone{opacity:0;transform:translateY(-8px);pointer-events:none}

.h-top {
  display:flex;
  justify-content:space-between;
  align-items:baseline;
}
.h-brand {
  font-family:var(--serif);
  font-size:24px;
  letter-spacing:0.02em;
  color:var(--text-bright);
}
#h-snd {
  font-size:11px;
  font-weight:500;
  letter-spacing:0.2em;
  color:var(--text-soft);
  cursor:pointer;
  transition:color 0.3s;
}
#h-snd.on { color:var(--gold); }

/* Absolute Typographic Centerpiece */
.h-hero {
  align-self:center;
  text-align:center;
  margin-top:-20px;
}
#h-pname {
  font-family:var(--serif);
  font-size:54px;
  font-weight:400;
  letter-spacing:0.04em;
  color:var(--text-bright);
  margin-bottom:32px;
}
.h-intervals {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:40px;
}
.h-int-group {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}
.h-label {
  font-size:10px;
  font-weight:600;
  letter-spacing:0.25em;
  color:var(--text-dark);
}
.h-divide {
  font-family:var(--serif);
  font-style:italic;
  font-size:20px;
  color:var(--text-dark);
  margin-top:24px;
}

/* Typographic Continuous Index Selectors */
.h-bottom {
  display:flex;
  flex-direction:column;
  gap:32px;
}
.h-spectrum-wrapper {
  display:flex;
  flex-direction:column;
  gap:12px;
  align-items:center;
}
.h-spectrum-title {
  font-size:9px;
  font-weight:700;
  letter-spacing:0.3em;
  color:var(--text-dark);
}
.h-spectrum {
  display:flex;
  justify-content:center;
  gap:24px;
  width:100%;
}
.spec-item {
  font-size:12px;
  font-weight:500;
  letter-spacing:0.15em;
  color:var(--text-dark);
  cursor:pointer;
  transition:color 0.3s, transform 0.3s;
}
.spec-item.on {
  color:var(--text-bright);
  transform:scale(1.05);
}
#sbtn {
  font-family:var(--sans);
  background:none;
  border:none;
  font-size:13px;
  font-weight:600;
  letter-spacing:0.3em;
  color:var(--gold);
  cursor:pointer;
  padding:16px;
  align-self:center;
  transition:opacity 0.2s, transform 0.2s;
}
#sbtn:active { transform:scale(0.98); opacity:0.8; }

/* ═══════════════════════════════════════════
   THE ACTIVE HORIZON SCREEN
═══════════════════════════════════════════ */
#clk {
  position:absolute;inset:32px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  opacity:0;pointer-events:none;
  transition:opacity .8s ease, transform .8s ease;
  transform:translateY(12px);
}
#clk.show { opacity:1; pointer-events:all; transform:translateY(0); }

.c-top {
  display:flex;
  justify-content:space-between;
  align-items:baseline;
}
.c-state-lbl {
  font-size:11px;
  font-weight:600;
  letter-spacing:0.25em;
  color:var(--text-soft);
  transition:color 0.5s;
}
#sess-ctr {
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:0.1em;
  color:var(--text-dark);
}
.ov-rest-hint {
  font-size:11px;
  letter-spacing:0.15em;
  color:var(--text-dark);
  font-family:var(--mono);
  margin-top:4px;
  transition:opacity 0.4s;
}

.c-main {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}
.ov-ctr {
  font-family:var(--mono);
  font-weight:400;
  font-size:clamp(54px, 12vw, 84px);
  letter-spacing:-0.03em;
  color:#ff4545;
  display:none;
  line-height:1;
}
.c-hint {
  font-size:11px;
  letter-spacing:0.2em;
  color:var(--text-dark);
  min-height:14px;
  text-transform:uppercase;
}
.inc-badge {
  font-size:12px;
  font-weight:700;
  letter-spacing:0.15em;
  color:#82ccff;
  opacity:0;
  transition:opacity 0.4s;
  background: rgba(16, 48, 69, 0.6);
  padding: 6px 14px;
  border-radius: 3px;
}
.inc-badge.show { opacity:1; }

.c-bottom {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
#clk-snd {
  font-size:11px;
  font-weight:500;
  letter-spacing:0.2em;
  color:var(--text-dark);
  cursor:pointer;
}
#clk-snd.on { color:var(--gold); }
#exit-btn {
  background:none; border:none;
  font-size:11px; font-weight:500; letter-spacing:0.2em;
  color:var(--text-soft); cursor:pointer;
}

/* Adaptive Space Scaling */
@media(min-width:768px){
  .canvas { padding:48px; }
  #home, #clk { inset:48px; }
  #home { max-width:520px; margin:0 auto; }
  #clk { max-width:600px; margin:0 auto; }
  #h-pname { font-size:64px; }
}

/* ── MOBILE CLIPPING FIXES ───────────────────────────── */
@media(max-width:480px){
  /* Scale down active clock flip digits */
  :root {
    --fw:44px; --fh:64px; --ffs:54px;
    --ftop:4px; --fbot:-27px;
  }
  /* Clamp home title so it never overflows */
  #h-pname {
    font-size: clamp(32px, 9vw, 54px);
    margin-bottom: 20px;
  }
  /* Remove negative margin that causes overlap on short screens */
  .h-hero {
    margin-top: 0;
  }
  /* Tighten interval gap for narrow viewports */
  .h-intervals {
    gap: 20px;
  }
  /* Reduce canvas padding so content has more room */
  .canvas {
    padding: 20px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    padding-top: max(20px, env(safe-area-inset-top));
  }
  #home, #clk {
    inset: 20px;
  }
  /* Tighten bottom section gap */
  .h-bottom {
    gap: 20px;
  }
  /* Shrink spectrum item text slightly */
  .spec-item {
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .h-spectrum {
    gap: 16px;
  }
}
</style>
</head>
<body>

<div class="canvas" id="canvas" data-sound="off" data-state="idle">

  <div id="home">
    <header class="h-top">
      <div class="h-brand">TEMPO</div>
      <div id="h-snd" onclick="cycleSnd(event)">· OFF</div>
    </header>

    <main class="h-hero">
      <h2 id="h-pname" onclick="homeNext()">CLASSIC</h2>
      <div class="h-intervals" onclick="homeNext()">
        <div class="h-int-group">
          <span class="h-label">FOCUS</span>
          <div class="flip-row" id="h-fda"></div>
        </div>
        <div class="h-divide">/</div>
        <div class="h-int-group">
          <span class="h-label">REST</span>
          <div class="flip-row" id="h-fdb"></div>
        </div>
      </div>
    </main>

    <footer class="h-bottom">
      <div class="h-spectrum-wrapper">
        <span class="h-spectrum-title">INTERVAL INDEX</span>
        <div class="h-spectrum" id="h-pills"></div>
      </div>
      <button id="sbtn">ENTER INTERVAL</button>
    </footer>
  </div>

  <div id="clk">
    <header class="c-top">
      <span class="c-state-lbl" id="c-state-indicator">FOCUS</span>
      <span id="sess-ctr" title="Sessions until long break">0 / 4 sessions</span>
    </header>

    <main class="c-main" id="clk-trigger">
      <div class="flip-row" id="fda"></div>
      <div class="flip-row" id="fdb" style="display:none;"></div>
      <div class="ov-ctr" id="ovd"></div>
      <div class="ov-rest-hint" id="ov-rest" style="display:none"></div>
      <div class="c-hint" id="ha"></div>
      <div class="inc-badge" id="inc-b">+2:00 added to break</div>
    </main>

    <footer class="c-bottom">
      <div id="clk-snd" onclick="cycleSnd(event)">· OFF</div>
      <button id="exit-btn" onclick="doExit()">DISMISS ×</button>
    </footer>
  </div>

</div>

<script>
// ── PRESETS ──────────────────────────────────────────
const PRESETS=[
  {name:'SPRINT',    f:15, r:3 },
  {name:'CLASSIC',   f:25, r:5 },
  {name:'DEEP',      f:50, r:10},
  {name:'ULTRADIAN', f:90, r:20},
];
const DELAY=5000, WARN_MS=5000, INC=120000;
const NOTIF_5MIN=5*60*1000;

// ── FLIP DIGIT ENGINE ────────────────────────────────
class FlipDigit{
  constructor(parent){
    this.el=document.createElement('div');
    this.el.className='fu';
    this.el.innerHTML=
      '<div class="fh t"><span></span></div>'+
      '<div class="fh b"><span></span></div>'+
      '<div class="flap ft"><span></span></div>'+
      '<div class="flap fb"><span></span></div>';
    parent.appendChild(this.el);
    const c=this.el.children;
    this.sT=c[0].querySelector('span'); this.sB=c[1].querySelector('span');
    this.fT=c[2]; this.fB=c[3];
    this.fsT=c[2].querySelector('span'); this.fsB=c[3].querySelector('span');
    this.cur=null; this._to=null;
  }
  set(n,anim=true){
    const ns=String(n);
    if(ns===this.cur)return;
    const prev=this.cur; this.cur=ns;
    if(prev===null||!anim){
      [this.sT,this.sB,this.fsT,this.fsB].forEach(e=>e.textContent=ns);
      return;
    }
    this.sT.textContent=ns; this.fsT.textContent=prev; this.fsB.textContent=ns;
    this.fT.classList.remove('go'); this.fB.classList.remove('go');
    void this.fT.offsetWidth;
    this.fT.classList.add('go'); this.fB.classList.add('go');
    clearTimeout(this._to);
    this._to=setTimeout(()=>{
      this.sB.textContent=ns;
      this.fT.classList.remove('go'); this.fB.classList.remove('go');
      this.fsT.textContent=ns; this.fsB.textContent=ns;
    },310);
  }
  color(c){
    this.el.querySelectorAll('span').forEach(s=>s.style.color=c);
    this.el.style.setProperty('--fd',c);
  }
  card(c){
    this.el.querySelectorAll('.fh,.flap').forEach(e=>e.style.backgroundColor=c);
    this.el.style.setProperty('--fc',c);
  }
}

class FlipDisplay{
  constructor(id){
    const w=document.getElementById(id);
    this.d=[new FlipDigit(w),new FlipDigit(w)];
    this.sep=document.createElement('div');
    this.sep.className='flip-sep'; this.sep.textContent=':';
    w.appendChild(this.sep);
    this.d.push(new FlipDigit(w)); this.d.push(new FlipDigit(w));
    this._ls=-1;
  }
  update(ms,anim=true){
    const s=Math.max(0,Math.ceil(ms/1000));
    if(s===this._ls&&anim)return;
    this._ls=s;
    const m=Math.floor(s/60),sc=s%60;
    [Math.floor(m/10),m%10,Math.floor(sc/10),sc%10]
      .forEach((d,i)=>this.d[i].set(d,anim));
  }
  color(c){this.d.forEach(d=>d.color(c));this.sep.style.color=c}
  card(c){this.d.forEach(d=>d.card(c))}
  size(fw,fh,ffs){
    const tp=((fh/2)-(ffs/2))+'px', bt=(-(ffs/2))+'px';
    this.d.forEach(d=>{
      d.el.style.setProperty('--fw',fw+'px');
      d.el.style.setProperty('--fh',fh+'px');
      d.el.style.setProperty('--ffs',ffs+'px');
      d.el.style.setProperty('--ftop',tp);
      d.el.style.setProperty('--fbot',bt);
    });
    this.sep.style.fontSize=ffs+'px';
  }
  reset(){this.d.forEach(d=>{d.cur=null});this._ls=-1}
}

// ── INITIALIZE RENDERING DECORATIONS ─────────────────
const hA =new FlipDisplay('h-fda');
const hB =new FlipDisplay('h-fdb');
const fdA=new FlipDisplay('fda');
const fdB=new FlipDisplay('fdb');
const isMobile = window.innerWidth <= 480;
hA.size(isMobile?28:38, isMobile?40:54, isMobile?34:46);
hB.size(isMobile?28:38, isMobile?40:54, isMobile?34:46);
fdA.size(isMobile?44:68, isMobile?64:96, isMobile?54:82);
fdB.size(isMobile?44:68, isMobile?64:96, isMobile?54:82);

// ── AUDIO LANDSCAPE ENGINE ───────────────────────────
class AmbientEngine{
  constructor(){
    this.ctx=null; this.out=null;
    this.nodes=[]; this.mode='off';
    this.tTO=null; this._swTO=null;
  }
  _init(){
    if(!this.ctx){
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      this.out=this.ctx.createGain(); this.out.gain.value=0;
      this.out.connect(this.ctx.destination);
    }
    if(this.ctx.state==='suspended')this.ctx.resume();
  }
  _noise(type){
    const sr=this.ctx.sampleRate, len=sr*3;
    const buf=this.ctx.createBuffer(1,len,sr);
    const d=buf.getChannelData(0);
    if(type==='brown'){
      let l=0; for(let i=0;i<len;i++){ const w=Math.random()*2-1; d[i]=Math.max(-1,Math.min(1,(l+0.02*w)/1.02)); l=d[i]; }
    } else if(type==='white'){
      for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    } else {
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for(let i=0;i<len;i++){
        const w=Math.random()*2-1;
        b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
        b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
        d[i]=Math.max(-1,Math.min(1,(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11)); b6=w*0.115926;
      }
    }
    return buf;
  }
  _src(buf){const s=this.ctx.createBufferSource();s.buffer=buf;s.loop=true;return s}
  _filt(type,freq,Q){const f=this.ctx.createBiquadFilter();f.type=type;f.frequency.value=freq;if(Q)f.Q.value=Q;return f}
  _gain(v){const g=this.ctx.createGain();g.gain.value=v;return g}
  _wire(src,...chain){
    let p=src; chain.forEach(n=>{p.connect(n);p=n}); p.connect(this.out); src.start(); this.nodes.push(src,...chain);
  }
  _fade(to,t=1.4){
    const g=this.out.gain, now=this.ctx.currentTime;
    g.cancelScheduledValues(now); g.setValueAtTime(g.value,now); g.linearRampToValueAtTime(to,now+t);
  }
  _kill(){
    clearTimeout(this.tTO);
    this.nodes.forEach(n=>{try{n.stop?.();n.disconnect?.()}catch(e){}}); this.nodes=[];
  }
  select(mode){
    this._init(); this.mode=mode;
    clearTimeout(this._swTO); this._fade(0,.3);
    this._swTO=setTimeout(()=>{this._kill();this._build(mode)},350);
    document.getElementById('canvas').setAttribute('data-sound', mode);
    updateSndUI();
  }
  _build(mode){
    if(mode==='off')return;
    if(mode==='rain'){
      this._wire(this._src(this._noise('brown')),this._gain(0.55));
      this._wire(this._src(this._noise('white')),this._filt('highpass',3000),this._gain(0.08));
      this._fade(0.6);
    } else if(mode==='storm'){
      this._wire(this._src(this._noise('brown')),this._gain(0.75));
      this._wire(this._src(this._noise('white')),this._filt('highpass',2200),this._gain(0.12));
      this._fade(0.65); this._thunder();
    } else if(mode==='cafe'){
      this._wire(this._src(this._noise('pink')),this._filt('bandpass',650,0.4),this._gain(0.9));
      this._fade(0.35);
    } else if(mode==='library'){
      this._wire(this._src(this._noise('pink')),this._filt('lowpass',320),this._gain(0.6));
      this._fade(0.2);
    }
  }
  _thunder(){
    if(this.mode!=='storm')return;
    this.tTO=setTimeout(()=>{
      if(this.mode!=='storm')return;
      const src=this._src(this._noise('white')), env=this._gain(0), lp=this._filt('lowpass',220);
      src.connect(lp); lp.connect(env); env.connect(this.out); this.nodes.push(src,lp,env); src.start();
      const t=this.ctx.currentTime; env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(0.5,t+0.1); env.gain.exponentialRampToValueAtTime(0.001,t+5);
      setTimeout(()=>{ try{src.stop()}catch(e){} this.nodes=this.nodes.filter(n=>n!==src&&n!==lp&&n!==env); },5200);
      this._thunder();
    },12000+Math.random()*22000);
  }
}
const ambient=new AmbientEngine();
const SND_MODES=['off','rain','storm','cafe','library'];
const SND_LBLS ={'off':'· OFF','rain':'· RAIN','storm':'· STORM','cafe':'· CAFE','library':'· LIBRARY'};
let sndIdx=0;

function cycleSnd(e){
  if(e)e.stopPropagation();
  sndIdx=(sndIdx+1)%SND_MODES.length;
  ambient.select(SND_MODES[sndIdx]);
  vibe(25);
}
function updateSndUI(){
  const lbl=SND_LBLS[SND_MODES[sndIdx]], on=sndIdx>0;
  ['h-snd','clk-snd'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.textContent=lbl; el.classList.toggle('on',on); }
  });
}

// ── HAPTICS ARCHITECTURE ─────────────────────────────
const vibe=p=>{try{navigator.vibrate?.(p)}catch(e){}};
const H={
  tap:  ()=>vibe([30,20,50]),
  run:  ()=>vibe([40,15,60]),
  warn: ()=>vibe([30,30,30]),
  done: ()=>vibe([80,40,120]),
  bDone:()=>vibe([40,20,40,20,40]),
  tick: ()=>vibe(10),
};

// ── SYSTEM HOOKS ─────────────────────────────────────
let wl=null;
async function grabWake(){ if(wl)return; try{if('wakeLock'in navigator)wl=await navigator.wakeLock.request('screen')}catch(e){} }
function dropWake(){try{wl?.release()}catch(e){}wl=null}

let notifGranted=false;
async function askNotif(){
  if(!('Notification'in window))return;
  if(Notification.permission==='granted'){notifGranted=true;return}
  if(Notification.permission!=='denied'){notifGranted=(await Notification.requestPermission())==='granted';}
}
function notify(title,body){
  if(!notifGranted||document.visibilityState==='visible')return;
  try{new Notification(title,{body,tag:'tempo',renotify:true,silent:true})}catch(e){}
}

// ── SYSTEM ENGINE STATE ──────────────────────────────
let pidx=1, S='home';
let aTotal,bTotal,aMs,bMs,aOver=0,delMs=DELAY;
let sess=0,incPend=false,warnFd=false,notifFd=false;
let ticker=null,lastT=null,incTO=null;

const $=id=>document.getElementById(id);
const canvasEl=$('canvas'), homeEl=$('home'), clkEl=$('clk');
const stateIndicator=$('c-state-indicator'), sessCtr=$('sess-ctr'), ha=$('ha');
const ovd=$('ovd'), incBadge=$('inc-b'), hPname=$('h-pname');
const fdaView=$('fda'), fdbView=$('fdb');

// ── BUILD TYPOGRAPHIC SPECTRUM INDEX ─────────────────
PRESETS.forEach((p,i)=>{
  const el=document.createElement('div');
  el.className='spec-item'+(i===1?' on':'');
  el.textContent=p.name;
  el.addEventListener('click',e=>{e.stopPropagation();pickPreset(i,true);vibe(30)});
  $('h-pills').appendChild(el);
});

function pickPreset(i,anim){
  pidx=i;
  document.querySelectorAll('.spec-item').forEach((p,j)=>p.classList.toggle('on',j===i));
  hPname.textContent=PRESETS[i].name;
  hA.color('#e8e5e0'); hA.card('#0f0e0d'); hA.sep.style.color='#383430';
  hB.color('#8a847c'); hB.card('#0f0e0d'); hB.sep.style.color='#383430';
  hA.update(PRESETS[i].f*60000,anim);
  hB.update(PRESETS[i].r*60000,anim);
}
function homeNext(){pickPreset((pidx+1)%PRESETS.length,true);vibe(35)}
pickPreset(1,false);

$('sbtn').addEventListener('click',()=>{
  askNotif(); initClock();
  homeEl.classList.add('gone');
  clkEl.classList.add('show');
});

// ── MAIN INTERACTIVE CORE ROUTINES ───────────────────
function initClock(){
  const p=PRESETS[pidx];
  aTotal=p.f*60000; bTotal=p.r*60000;
  aMs=aTotal; bMs=bTotal; aOver=0; delMs=DELAY;
  sess=0; incPend=false; warnFd=false; notifFd=false;
  S='idle'; stopTick();
  fdA.reset(); fdB.reset();
  fdA.update(aMs,false); fdB.update(bMs,false);
  render();
}

$('clk-trigger').addEventListener('click', ()=>{
  if(S==='idle'){
    S='a_del'; delMs=DELAY; warnFd=false; startTick(); H.tap();
  } else if(S==='a_del'){
    // impatient tap during countdown — just skip straight to running
    S='a_run'; delMs=0; grabWake(); H.run();
  } else if(S==='a_run'){
    incPend=false; gotoBreak(); H.tap();
  } else if(S==='a_ov'){
    gotoBreak(); H.tap();
  } else if(S==='b_run'){
    gotoFocus(); H.tap();
  } else if(S==='b_done'){
    aMs=aTotal; bMs=bTotal;
    fdA.reset(); fdB.reset();
    fdA.update(aMs,false); fdB.update(bMs,false);
    S='a_del'; delMs=DELAY; warnFd=false; startTick(); H.tap();
  }
  render();
});

function gotoBreak(){
  stopTick();
  bMs=incPend?bTotal+INC:bTotal;
  if(incPend)showInc();
  incPend=false; warnFd=false; notifFd=false;
  fdB.reset(); fdB.update(bMs,false);
  S='b_run'; startTick(); grabWake();
}
function gotoFocus(){
  stopTick();
  aMs=aTotal; aOver=0; warnFd=false; notifFd=false;
  // preserve incPend — if user earned bonus break but exited early, carry it to next break
  fdA.reset(); fdA.update(aMs,false);
  S='a_del'; delMs=DELAY; startTick();
}

function startTick(){
  stopTick(); lastT=performance.now();
  ticker=setInterval(()=>{
    if(lastT===null)return;
    const now=performance.now(); tick(now-lastT); lastT=now;
  },80);
}
function stopTick(){if(ticker){clearInterval(ticker);ticker=null}dropWake()}

function tick(dt){
  if(S==='a_del'){
    const ps=Math.ceil(delMs/1000); delMs-=dt; const cs=Math.ceil(Math.max(0,delMs)/1000);
    if(cs<ps&&cs>0) H.tick();
    if(delMs<=0){S='a_run';delMs=0;grabWake();H.run();render();return}
  } else if(S==='a_run'){
    aMs-=dt;
    if(!warnFd&&aMs<=WARN_MS&&aMs>0){warnFd=true;H.warn()}
    if(aMs<=0){
      aMs=0; aOver=0; incPend=true; sess++; S='a_ov'; H.done();
      notify('Focus complete','Time for a break.');
    } else fdA.update(aMs,true);
  } else if(S==='a_ov'){
    aOver+=dt;
  } else if(S==='b_run'){
    bMs-=dt;
    if(!notifFd&&bTotal>NOTIF_5MIN&&bMs<=NOTIF_5MIN&&bMs>0){ notifFd=true; notify('Break ending soon','5 minutes remaining.'); }
    if(!warnFd&&bMs<=WARN_MS&&bMs>0){warnFd=true;H.warn()}
    if(bMs<=0){
      bMs=0; S='b_done'; fdB.update(0,false); stopTick(); H.bDone();
      notify('Break over','Ready to focus again.');
    } else fdB.update(bMs,true);
  }
  render();
}

// ── PREMIUM CONTEXTUAL RENDER ────────────────────────
const ovRest=document.getElementById('ov-rest');
function render(){
  canvasEl.setAttribute('data-state', S);

  if(S==='idle'){
    fdaView.style.display='flex'; fdbView.style.display='none'; ovd.style.display='none'; ovRest.style.display='none';
    fdA.color('#544e46'); fdA.card('#0f0e0d');
    stateIndicator.textContent='READY'; stateIndicator.style.color='var(--text-soft)';
    ha.textContent='TAP TO START';

  } else if(S==='a_del'){
    fdaView.style.display='flex'; fdbView.style.display='none'; ovd.style.display='none'; ovRest.style.display='none';
    fdA.color('#e8e5e0'); fdA.card('#171513');
    stateIndicator.textContent='FOCUS'; stateIndicator.style.color='var(--text-bright)';
    ha.textContent='STARTING IN '+Math.max(1,Math.ceil(delMs/1000));

  } else if(S==='a_run'){
    fdaView.style.display='flex'; fdbView.style.display='none'; ovd.style.display='none'; ovRest.style.display='none';
    fdA.color('#ffbe85'); fdA.card('#0f0e0d');
    stateIndicator.textContent='FOCUS'; stateIndicator.style.color='var(--gold)';
    ha.textContent='TAP TO TAKE DOWNTIME';

  } else if(S==='a_ov'){
    fdaView.style.display='none'; fdbView.style.display='none'; ovd.style.display='block'; ovRest.style.display='block';
    const os=Math.floor(aOver/1000);
    ovd.textContent='+'+String(Math.floor(os/60)).padStart(2,'0')+':'+String(os%60).padStart(2,'0');
    // Show how much break time remains after overtime eats into it
    const restLeft=Math.max(0, bTotal - aOver);
    const rs=Math.ceil(restLeft/1000);
    const rm=Math.floor(rs/60), rsc=rs%60;
    ovRest.textContent='BREAK '+String(rm).padStart(2,'0')+':'+String(rsc).padStart(2,'0')+' REMAINING';
    stateIndicator.textContent='OVERTIME'; stateIndicator.style.color='#ff4545';
    ha.textContent='TAP ANYWHERE TO START BREAK';

  } else if(S==='b_run'){
    fdaView.style.display='none'; fdbView.style.display='flex'; ovd.style.display='none'; ovRest.style.display='none';
    fdB.color('#82ccff'); fdB.card('#0a1117');
    stateIndicator.textContent='BREAK'; stateIndicator.style.color='#82ccff';
    ha.textContent='TAP TO END BREAK EARLY';

  } else if(S==='b_done'){
    fdaView.style.display='none'; fdbView.style.display='flex'; ovd.style.display='none'; ovRest.style.display='none';
    fdB.color('#223f54'); fdB.card('#060a0f');
    stateIndicator.textContent='BREAK OVER'; stateIndicator.style.color='var(--text-soft)';
    ha.textContent=(sess>0&&sess%4===0)?'TAKE A LONG BREAK NOW':'TAP TO FOCUS AGAIN';
  }

  const s4=(sess%4===0&&sess>0)?4:sess%4;
  sessCtr.textContent=`${s4} / 4 sessions`;
  sessCtr.style.color=(sess>0&&sess%4===0)?'#82ccff':'var(--text-dark)';
}

function showInc(){
  incBadge.classList.add('show');
  clearTimeout(incTO); incTO=setTimeout(()=>incBadge.classList.remove('show'),5000);
}

function doExit(){
  stopTick();
  clearTimeout(incTO);
  S='home';
  sess=0; incPend=false; warnFd=false; notifFd=false;
  aOver=0; delMs=DELAY;
  clkEl.classList.remove('show');
  homeEl.classList.remove('gone');
  canvasEl.setAttribute('data-state','idle');
  incBadge.classList.remove('show');
  fdA.reset(); fdB.reset();
  // reset session counter display
  sessCtr.textContent='0 / 4 sessions';
  sessCtr.style.color='var(--text-dark)';
  stateIndicator.textContent='READY';
  stateIndicator.style.color='var(--text-soft)';
}

if('serviceWorker'in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(e=>console.warn(e)); });
}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    lastT=null;
  } else {
    // Only resume tick reference if we're in a state that should be counting
    // For a_ov (overtime), don't silently add hidden time — reset reference
    if(ticker) lastT=performance.now();
  }
});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
